<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>긍정 게시판</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">Positive Board</p>
        <h1>긍정 게시판</h1>
        <p class="subtitle">서로에게 힘이 되는 이야기를 조용히 나누는 공간</p>
      </div>
      <div class="auth-area">
        <div id="userInfo" class="user-info"></div>
        <div class="auth-buttons">
          <button id="loginBtn" onclick="login()">로그인</button>
          <button id="logoutBtn" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <h2>게시글 목록</h2>
      <button id="toggleWriteBtn" onclick="toggleWriteForm()">글쓰기</button>
    </section>

    <section id="writePanel" class="write-panel" hidden>
      <input id="postTitleInput" type="text" placeholder="제목을 입력하세요" maxlength="80" />
      <textarea id="postInput" placeholder="응원, 고민, 감사의 메시지를 적어보세요..." rows="5"></textarea>
      <div class="write-actions">
        <button class="secondary-btn" onclick="toggleWriteForm(false)">닫기</button>
        <button id="submitBtn" onclick="submitPost()">글 올리기</button>
      </div>
    </section>

    <section id="postList" class="post-list"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
