<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>긍정 게시판</title>
  <link rel="stylesheet" href="style.css?v=20260611-4">
  <link rel="stylesheet" href="header-mascot.css?v=20260611-4">
  <link rel="stylesheet" href="robot-polisher.css?v=20260611-4">
  <link rel="stylesheet" href="robot-polisher-parts.css?v=20260611-4">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>
  <canvas id="characterCanvas" aria-hidden="true"></canvas>

  <main class="app-shell">
    <header class="top-bar">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">K</div>
        <div>
          <p class="eyebrow">kangikgyu official</p>
          <h1>긍정 게시판</h1>
          <p class="subtitle">kangikgyu가 만들고 운영하는 따뜻한 댓글 공간</p>
          <p class="trust-badge">운영자 확인 게시판</p>
        </div>
      </div>
      <div class="header-mascot" aria-label="F 모드 안내 로봇">
        <div class="header-robot" aria-hidden="true">
          <span class="mini-part mini-antenna"></span>
          <span class="mini-part mini-head">
            <span class="mini-eye left"></span>
            <span class="mini-eye right"></span>
          </span>
          <span class="mini-part mini-body">
            <span class="mini-chest"></span>
          </span>
          <span class="mini-part mini-arm left"></span>
          <span class="mini-part mini-arm right"></span>
          <span class="mini-moss one"></span>
          <span class="mini-moss two"></span>
        </div>
        <p class="header-speech">F 모드로<br>내가 전해줄께</p>
      </div>
      <div class="auth-area">
        <div id="userInfo" class="user-info"></div>
        <div class="auth-buttons">
          <button id="loginBtn" onclick="login()">로그인</button>
          <button id="logoutBtn" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <h2>게시글 목록</h2>
      <button id="toggleWriteBtn" onclick="toggleWriteForm()">글쓰기</button>
    </section>

    <section id="writePanel" class="write-panel" hidden>
      <input id="postTitleInput" type="text" placeholder="제목을 입력하세요" maxlength="80" />
      <textarea id="postInput" placeholder="응원, 고민, 감사의 메시지를 적어보세요..." rows="5"></textarea>
      <div class="write-actions">
        <button class="secondary-btn" onclick="toggleWriteForm(false)">닫기</button>
        <button id="submitBtn" onclick="submitPost()">글 올리기</button>
      </div>
    </section>

    <section id="postList" class="post-list"></section>
  </main>

  <script src="background.js?v=20260611-4"></script>
  <script src="script.js?v=20260611-4"></script>
  <script src="robot-polisher.js?v=20260611-4"></script>
</body>
</html>
