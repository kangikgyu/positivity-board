<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>따듯한 게시판 in 익규 유니버스</title>
  <link rel="stylesheet" href="style.css?v=20260620-2">
  <link rel="stylesheet" href="header-mascot.css?v=20260620-2">
  <link rel="stylesheet" href="robot-polisher.css?v=20260611-4">
  <link rel="stylesheet" href="robot-polisher-parts.css?v=20260611-4">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-functions-compat.js"></script>
</head>
<body>
  <canvas id="characterCanvas" aria-hidden="true"></canvas>
  <div class="scroll-orb-field" aria-hidden="true">
    <span class="scroll-orb orb-one"></span>
    <span class="scroll-orb orb-two"></span>
    <span class="scroll-orb orb-three"></span>
    <span class="scroll-companion"></span>
  </div>

  <main class="app-shell">
    <header class="top-bar">
      <div class="header-mascot" aria-label="따듯한 댓글 골렘 안내">
        <img class="header-golem-image" src="./icons/golem-front.png" alt="따듯한 댓글을 만들어주는 골렘" loading="eager" onerror="this.onerror=null; this.src='./icons/favicon.svg';" />
        <p class="header-speech">거친 말은 골렘이 먹고,<br>따듯한 댓글로 다시 꺼내줄께요.</p>
      </div>
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">익</div>
        <div>
          <p class="eyebrow">kangikgyu official</p>
          <h1>따듯한 게시판<br><span>in 익규 유니버스</span></h1>
          <p class="subtitle">말을 조금 더 따듯하게 바꿔주는<br>익규 유니버스 게시판</p>
          <p class="trust-badge">운영자 확인 게시판</p>
        </div>
      </div>
      <div class="auth-area">
        <div id="userInfo" class="user-info"></div>
        <div class="auth-buttons">
          <button id="loginBtn" onclick="login()">관리자 로그인</button>
          <button id="logoutBtn" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <h2>게시글 목록</h2>
      <button id="toggleWriteBtn" onclick="toggleWriteForm()">글쓰기</button>
    </section>

    <section id="writePanel" class="write-panel" hidden>
      <input id="postTitleInput" type="text" placeholder="제목을 입력하세요" maxlength="80" />
      <input id="postAuthorInput" type="text" placeholder="작성자 (비워두면 익명)" maxlength="40" />
      <textarea id="postInput" placeholder="거친 말도 괜찮아요. 골렘이 따듯한 댓글로 다듬어줄게요..." rows="5"></textarea>
      <div class="write-actions">
        <button class="secondary-btn" onclick="toggleWriteForm(false)">닫기</button>
        <button id="submitBtn" onclick="submitPost()">글 올리기</button>
      </div>
    </section>

    <section id="postList" class="post-list"></section>
  </main>

  <script src="background.js?v=20260620-2"></script>
  <script src="script.js?v=20260620-2"></script>
  <script src="robot-polisher.js?v=20260611-4"></script>
</body>
</html>
