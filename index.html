<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>고민 게시판 in 익규 유니버스</title>
  <link rel="stylesheet" href="style.css?v=20260624-1">
  <link rel="stylesheet" href="admin-author.css?v=20260622-1">
  <link rel="stylesheet" href="header-mascot.css?v=20260620-3">
  <link rel="stylesheet" href="robot-polisher.css?v=20260624-1">
  <link rel="stylesheet" href="robot-polisher-parts.css?v=20260611-4">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-functions-compat.js"></script>
</head>
<body>
  <div id="splashScreen" class="splash-screen" aria-label="고민 게시판 골렘 인트로">
    <img src="./icons/golem-front-9x16.png?v=3" alt="고민 게시판 인트로 골렘" />
  </div>

  <canvas id="characterCanvas" aria-hidden="true"></canvas>
  <div class="scroll-orb-field" aria-hidden="true">
    <span class="scroll-orb orb-one"></span>
    <span class="scroll-orb orb-two"></span>
    <span class="scroll-orb orb-three"></span>
    <span class="scroll-companion"></span>
  </div>

  <main class="app-shell">
    <header class="top-bar">
      <div class="header-mascot" aria-label="따듯한 댓글 골렘 배너">
        <div class="hero-banner">
          <img src="./icons/golem-front-27x9.png?v=3" alt="거친 말을 따듯한 댓글로 바꿔주는 골렘 안내 배너" loading="eager" />
        </div>
      </div>
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">익</div>
        <div>
          <p class="eyebrow">kangikgyu official</p>
          <h1>고민 게시판<br><span>in 익규 유니버스</span></h1>
          <p class="subtitle">고민을 조금 더 안전하게 나누는<br>익규 유니버스 게시판</p>
          <p class="trust-badge">운영자 확인 게시판</p>
        </div>
      </div>
      <div class="auth-area">
        <div id="userInfo" class="user-info"></div>
        <div class="auth-buttons">
          <button id="loginBtn" onclick="login()">관리자 로그인</button>
          <button id="logoutBtn" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <h2>게시글 목록</h2>
      <button id="toggleWriteBtn" onclick="toggleWriteForm()">글쓰기</button>
    </section>

    <section id="adminDashboard" class="admin-dashboard" hidden aria-labelledby="adminDashboardHeading">
      <div class="admin-dashboard-header">
        <div>
          <p class="admin-dashboard-eyebrow">admin dashboard</p>
          <h2 id="adminDashboardHeading">운영자 대시보드</h2>
        </div>
        <button id="refreshAdminDashboardBtn" type="button">새로고침</button>
      </div>
      <div id="adminDashboardStats" class="admin-stats-grid">
        <article class="admin-stat-card">
          <span>전체 게시글</span>
          <strong id="totalPostCount">-</strong>
        </article>
        <article class="admin-stat-card">
          <span>전체 댓글</span>
          <strong id="totalCommentCount">-</strong>
        </article>
        <article class="admin-stat-card">
          <span>오늘 게시글</span>
          <strong id="todayPostCount">-</strong>
        </article>
        <article class="admin-stat-card">
          <span>오늘 댓글</span>
          <strong id="todayCommentCount">-</strong>
        </article>
        <article class="admin-stat-card">
          <span>관리자 작성 글</span>
          <strong id="adminPostCount">-</strong>
        </article>
      </div>
      <p id="adminDashboardStatus" class="admin-dashboard-status">관리자 로그인 시 한 번 계산됩니다.</p>
    </section>

    <section id="dailyTopicCard" class="daily-topic-card" aria-labelledby="dailyTopicHeading">
      <div class="daily-topic-copy">
        <p class="daily-topic-eyebrow">오늘의 고민 주제</p>
        <h2 id="dailyTopicHeading">오늘 마음에 걸린 말을 조금 다르게 꺼내봐요</h2>
        <p id="dailyTopicText">오늘 내가 듣고 싶었던 따뜻한 말은?</p>
      </div>
      <button id="useDailyTopicBtn" type="button">이 주제로 써보기</button>
    </section>

    <section id="writePanel" class="write-panel" hidden>
      <input id="postTitleInput" type="text" placeholder="제목을 입력하세요" maxlength="80" />
      <input id="postAuthorInput" type="text" placeholder="작성자 (비워두면 익명)" maxlength="40" />
      <label class="tone-style-field" for="toneStyleSelect">
        <span>AI 말투 스타일</span>
        <select id="toneStyleSelect" class="tone-style-select">
          <option value="부드럽게">부드럽게</option>
          <option value="솔직하지만 예의 있게">솔직하지만 예의 있게</option>
          <option value="친구처럼">친구처럼</option>
          <option value="짧고 담백하게">짧고 담백하게</option>
        </select>
      </label>
      <textarea id="postInput" placeholder="거친 말도 괜찮아요. 골렘이 따듯한 댓글로 다듬어줄게요..." rows="5"></textarea>
      <div class="write-actions">
        <button class="secondary-btn" onclick="toggleWriteForm(false)">닫기</button>
        <button id="submitBtn" onclick="submitPost()">글 올리기</button>
      </div>
    </section>

    <section id="postList" class="post-list"></section>
  </main>

  <script src="background.js?v=20260620-3"></script>
  <script src="script.js?v=20260625-1"></script>
  <script src="robot-polisher.js?v=20260624-1"></script>
</body>
</html>
