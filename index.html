<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>긍정 게시판</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-buttons">
    <button id="loginBtn" onclick="login()">🔑 로그인</button>
    <button id="logoutBtn" onclick="logout()">🚪 로그아웃</button>
  </div>
  <div id="userInfo" class="user-info"></div>

  <div class="container">
    <section class="calculator-section" aria-labelledby="interestCalculatorTitle">
      <h1 id="interestCalculatorTitle">💰 이자율 계산기</h1>
      <p class="section-description">원금, 연 이자율, 기간을 입력하면 단리와 복리 기준 예상 금액을 한 번에 확인할 수 있어요.</p>

      <div class="calculator-grid">
        <label class="field">
          <span>원금 (₩)</span>
          <input id="principalInput" type="number" min="0" step="1000" value="1000000" />
        </label>
        <label class="field">
          <span>연 이자율 (%)</span>
          <input id="rateInput" type="number" min="0" step="0.1" value="3.5" />
        </label>
        <label class="field">
          <span>기간 (년)</span>
          <input id="yearsInput" type="number" min="0" step="0.5" value="3" />
        </label>
        <label class="field">
          <span>복리 횟수</span>
          <select id="compoundFrequencyInput">
            <option value="1">연 1회</option>
            <option value="2">반기 2회</option>
            <option value="4">분기 4회</option>
            <option value="12" selected>월 12회</option>
            <option value="365">매일 365회</option>
          </select>
        </label>
      </div>

      <div class="calculator-actions">
        <button id="calculateBtn" type="button" onclick="calculateInterest()">이자 계산하기</button>
      </div>

      <div class="results-card" aria-live="polite">
        <h2>계산 결과</h2>
        <div class="result-list">
          <div>
            <span class="result-label">단리 이자</span>
            <strong id="simpleInterestResult">₩0</strong>
          </div>
          <div>
            <span class="result-label">단리 만기 금액</span>
            <strong id="simpleTotalResult">₩0</strong>
          </div>
          <div>
            <span class="result-label">복리 이자</span>
            <strong id="compoundInterestResult">₩0</strong>
          </div>
          <div>
            <span class="result-label">복리 만기 금액</span>
            <strong id="compoundTotalResult">₩0</strong>
          </div>
        </div>
        <p id="interestSummary" class="interest-summary">값을 입력하고 계산 버튼을 눌러보세요.</p>
      </div>
    </section>

    <section aria-labelledby="boardTitle">
      <h2 id="boardTitle">편하게 긍정 메시지를 나누는 따뜻한 게시판</h2>
      <textarea id="postInput" placeholder="여기에 고민이나 응원의 메시지를 써보세요..." rows="4"></textarea>
      <button id="submitBtn" onclick="submitPost()">글 올리기</button>

      <h2>📃 게시글 목록</h2>
      <div id="postList"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
